<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Linear Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>

    <!-- Glowing Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" /> <!-- Indigo -->
      <stop offset="50%" stop-color="#2dd4bf" /> <!-- Teal -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- Purple -->
    </linearGradient>

    <!-- Accent Line Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0" />
      <stop offset="15%" stop-color="#4f46e5" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="1" />
      <stop offset="85%" stop-color="#7c3aed" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </linearGradient>

    <!-- Radial Glows -->
    <radialGradient id="glowLeft" cx="10%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="90%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow Filter for Glow -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Ambient Glow Layers -->
  <rect width="100%" height="100%" fill="url(#glowLeft)" />
  <rect width="100%" height="100%" fill="url(#glowRight)" />

  <!-- Tech Grid Overlay -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <!-- Vertical lines every 40px -->
    <line x1="40" y1="0" x2="40" y2="200" />
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="120" y1="0" x2="120" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
    <line x1="280" y1="0" x2="280" y2="200" />
    <line x1="320" y1="0" x2="320" y2="200" />
    <line x1="360" y1="0" x2="360" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="440" y1="0" x2="440" y2="200" />
    <line x1="480" y1="0" x2="480" y2="200" />
    <line x1="520" y1="0" x2="520" y2="200" />
    <line x1="560" y1="0" x2="560" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="640" y1="0" x2="640" y2="200" />
    <line x1="680" y1="0" x2="680" y2="200" />
    <line x1="720" y1="0" x2="720" y2="200" />
    <line x1="760" y1="0" x2="760" y2="200" />

    <!-- Horizontal lines every 40px -->
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
  </g>

  <!-- Decorative Circuit Path Lines -->
  <path d="M-10,100 L200,100 L240,140 L300,140 M810,100 L600,100 L560,60 L500,60" fill="none" stroke="#2dd4bf" stroke-opacity="0.1" stroke-width="1.5" />
  <circle cx="300" cy="140" r="2" fill="#2dd4bf" fill-opacity="0.2" />
  <circle cx="500" cy="60" r="2" fill="#818cf8" fill-opacity="0.2" />

  <!-- Center Content -->
  <g transform="translate(400, 100)" text-anchor="middle">
    <!-- Bracket Icon Logo -->
    <text y="-45" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#2dd4bf" fill-opacity="0.85" filter="url(#glowFilter)">&lt; X &gt;</text>

    <!-- Main Title -->
    <text y="5" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="900" letter-spacing="4" fill="url(#textGrad)">XIMI</text>

    <!-- Subtitle -->
    <text y="42" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#94a3b8" text-transform="uppercase">Full-Stack Developer &amp; AI Systems Engineer</text>
    
    <!-- Core Taglines -->
    <text y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="1" fill="#64748b">FinTech • Data Intelligence • Automation • Web Engineering</text>
  </g>

  <!-- Dynamic Glowing Bottom Accent Border Line -->
  <rect x="50" y="196" width="700" height="2.5" rx="1.25" fill="url(#lineGrad)" filter="url(#glowFilter)" />
</svg>
